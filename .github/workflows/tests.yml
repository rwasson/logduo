name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -c "from pathlib import Path; Path('developer_resources/logduo_validation/logs').mkdir(parents=True, exist_ok=True)"

      - name: Run pytest suite
        run: python -m developer_resources.logduo_validation.master_test_runner

      - name: Run example scripts
        run: python -m developer_resources.logduo_validation.example_scripts_runner

      - name: Test documentation export
        run: python -m developer_resources.logduo_validation.export_logduo_docs_demo

      - name: Run Ruff, mypy, and Vulture
        run: python -m developer_resources.logduo_validation.linter_check
