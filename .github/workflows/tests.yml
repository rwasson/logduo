# tests.yml
# Logduo GitHub Actions test workflow
#
# Purpose:
# - Runs the Logduo validation suite on Ubuntu, macOS, and Windows
# - Uses Python 3.13
# - Runs pytest, example scripts, documentation export, and lint/type checks
#
# Where it runs:
# - Runs only through GitHub Actions
# - Do not run this file directly in PyCharm or with Python
#
# When it runs on GitHub:
# - On every push
# - On every pull request
#
# Authoritative copy:
# - The definitive copy of this workflow is stored in the local Logduo project
# - Edit this file locally, then commit and push it to GitHub
# - Do not edit this file directly on GitHub
#
# Important:
# - This workflow checks the committed GitHub copy only
# - It runs on temporary GitHub machines
# - It does not modify or push changes to the main branch


name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -c "from pathlib import Path; Path('developer_resources/logduo_validation/logs').mkdir(parents=True, exist_ok=True)"

      - name: Run pytest suite
        run: python -m developer_resources.logduo_validation.pytest_harness_runner

      - name: Run example scripts
        run: python -m developer_resources.logduo_validation.example_scripts_runner

      - name: Run Ruff, mypy, and Vulture
        run: python -m developer_resources.logduo_validation.linter_runner
